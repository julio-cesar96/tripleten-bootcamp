<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title> TechNews </title>
</head>
<body>
    <header class="header">
        <div class="header__logo">
            <img src="assets/logo.png" alt="TechNews Logo">
            <h1> TechNews </h1>
        </div>
        <nav class="header__menu">
            <ul>
                <li class="header__menu-item"><a href="#"> About </a></li>
                <li class="header__menu-item"><a href="#"> Training </a></li>
                <li class="header__menu-item"><a href="#"> Testemonials </a></li>
                <li class="header__menu-item"><a href="#"> Contact </a></li>
            </ul>
        </nav>
        <div class="header__cta">
            <a href="#" class="header__cta-button"> JOIN TODAY </a>
        </div>
    </header>
    <main class="hero">
        <div class="hero__content">
            <p class="hero__description"> ACHIEVE YOUR FITNESS GOALS </p>
            <h2 class="hero__title"> FIND YOUR <br /> STRENGTH </h2>
        </div>
        <div class="hero__media">
            <div class="hero__media--content">
                <h2 class="hero__media-title"> INSIDE <br /> AND OUT. </h2>
            </div>
            <footer class="hero__footer">
                <p class="hero__footer-text">© 2023 TechNews. All rights reserved.</p>
                <button class="hero__footer-button"> Privacy Policy </button>
            </footer>
        </div>
    </main>
</body>
</html>
