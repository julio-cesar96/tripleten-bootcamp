<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Validação com Javascript</title>
</head>
<body>
    <form id="meuForm" novalidate>
        <div class="campo">
            <label for="nome">Nome:</label>
            <input 
                type="text" 
                id="nome" 
                placeholder="Seu nome completo"
                class="input-valido"
            >
            <span class="erro" id="erro-nome"></span>
        </div>

        <div class="campo">
            <label for="email">Email:</label>
            <input 
                type="email" 
                id="email" 
                placeholder="Seu email completo"
                class="input-valido"
            >
            <span class="erro" id="erro-email"></span>
        </div>

        <div class="campo">
            <label for="senha">Senha:</label>
            <input 
                type="password" 
                id="senha" 
                placeholder="Sua senha completa"
                class="input-valido"
            >
            <span class="erro" id="erro-senha"></span>
        </div>
       

        <button type="submit">Cadastrar</button>
    </form>

    <script src="main.js"></script>
</body>
</html>
